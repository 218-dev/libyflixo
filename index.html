<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LibyFlix - مشاهدة الأفلام والمسلسلات</title>

    <meta name="description" content="LibyFlix منصة لمشاهدة الأفلام والمسلسلات بجودة عالية مع واجهة سريعة وسهلة الاستخدام." />
    <meta name="keywords" content="LibyFlix, أفلام, مسلسلات, مشاهدة, بث مباشر, Movies, Series" />
    <meta name="author" content="LibyFlix" />

    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://libyflix.abdo.com.ly/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LibyFlix - مشاهدة الأفلام والمسلسلات" />
    <meta property="og:description" content="استمتع بمشاهدة الأفلام والمسلسلات بجودة عالية على LibyFlix." />
    <meta property="og:url" content="https://libyflix.abdo.com.ly/" />
    <meta property="og:image" content="https://libyflix.abdo.com.ly/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LibyFlix - مشاهدة الأفلام والمسلسلات" />
    <meta name="twitter:description" content="استمتع بمشاهدة الأفلام والمسلسلات بجودة عالية على LibyFlix." />
    <meta name="twitter:image" content="https://libyflix.abdo.com.ly/logo.png" />

    <!-- Favicon & Logo -->
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="shortcut icon" href="/logo.png" type="image/png" />

    <!-- PWA Manifest & Theming -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#09090b" />

    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LibyFlix" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo.png" />

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
