<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مشغل الفيلم</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 16px;
        }
        .wrapper {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 24px 24px 30px;
            max-width: 880px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #333;
        }
        h1 {
            color: #f5f5f5;
            text-align: center;
            font-weight: 400;
            font-size: 1.9rem;
            margin: 0 0 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #3a3a3a;
        }
        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            display: block;
        }
        .msg-box {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 10px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.6;
            border-right: 4px solid #f0a500;
        }
        .msg-box.error {
            border-right-color: #e74c3c;
            background: #2d1e1e;
        }
        .msg-box a {
            color: #6ea8fe;
            text-decoration: none;
            border-bottom: 1px dashed #6ea8fe;
        }
        .msg-box a:hover { color: #a0c8ff; }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0 8px;
            justify-content: center;
        }
        .btn {
            display: inline-block;
            padding: 10px 22px;
            background: #3a3a3a;
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
            border: 1px solid #555;
        }
        .btn:hover { background: #555; }
        .btn-primary { background: #1a73e8; border-color: #1a73e8; }
        .btn-primary:hover { background: #1558b0; }
        .footer-note {
            color: #777;
            text-align: center;
            margin-top: 18px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>🎬 تشغيل الفيلم</h1>

    <video id="filmPlayer" controls preload="auto" playsinline>
        متصفحك لا يدعم عنصر الفيديو.
    </video>

    <div id="statusMessage" class="msg-box">
        ⏳ جاري تجهيز الفيديو ... انتظر قليلاً.
    </div>

    <div class="btn-group">
        <a id="downloadBtn" href="#" download class="btn btn-primary">📥 تحميل الفيلم</a>
        <a id="vlcBtn" href="#" class="btn">📱 فتح بـ VLC (أندرويد)</a>
        <a id="newWindowBtn" href="#" class="btn">🌐 فتح في نافذة جديدة</a>
    </div>

    <div class="footer-note">
        🔗 رابط الفيديو يحتوي على رمز توثيق · قد لا يعمل المشغل الداخلي مع جميع المتصفحات.
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const rawUrl = urlParams.get('url');
        
        if (!rawUrl) {
            document.getElementById('statusMessage').textContent = '❌ لا يوجد رابط فيلم.';
            return;
        }

        const streamUrl = '/api/stream?url=' + encodeURIComponent(rawUrl);
        const video = document.getElementById('filmPlayer');
        const msg = document.getElementById('statusMessage');

        // Set video source
        video.src = streamUrl;
        video.load();

        // Set buttons
        document.getElementById('downloadBtn').href = rawUrl;
        document.getElementById('vlcBtn').href = 'intent://' + rawUrl.replace(/^https?:\/\//, '') + '#Intent;action=android.intent.action.VIEW;scheme=http;package=org.videolan.vlc;end';
        document.getElementById('newWindowBtn').onclick = function() { window.open(rawUrl); return false; };

        // Functions
        function setMessage(text, isError = false) {
            msg.textContent = text;
            msg.classList.toggle('error', isError);
        }

        video.addEventListener('loadedmetadata', function() {
            setMessage('✅ الفيديو جاهز للتشغيل. اضغط على ▶️');
        });

        video.addEventListener('error', function(e) {
            setMessage('❌ حدث خطأ أثناء تحميل الفيديو. استخدم الأزرار أدناه لتشغيل الفيلم عبر تطبيق خارجي.', true);
        });
    })();
</script>

</body>
</html>
